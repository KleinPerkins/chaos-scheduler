name: Figma Variables Sync

# One-way repo -> Figma sync of design tokens to the file's `cs.*` local
# variables. Source of truth is figma-tokens.json (generated by Style
# Dictionary from tokens/*.json); Figma is downstream.
#
# SAFE BY DEFAULT: this workflow only ever runs the sync script in --dry-run
# (report) mode — it reads Figma's current variables and prints the diff, and
# NEVER writes. The script is create-or-update only and structurally cannot
# delete. The first real apply is a deliberate, operator-reviewed manual step
# (`--apply` + FIGMA_SYNC_ALLOW_APPLY=1); see scripts/figma-variables-sync.mjs.
#
# Intentionally NOT part of the `ci-required` fan-in: a Figma API/PAT-scope
# issue must never block a code merge. The unit-test step needs no secret; the
# dry-run step is fork-guarded because fork PRs can't read the token.

on:
  push:
    branches: [main]
    paths:
      - "tokens/**"
      - "figma-tokens.json"
      - "scripts/figma-variables-sync.mjs"
      - "scripts/figma-variables-sync.test.mjs"
      - ".github/workflows/figma-variables-sync.yml"
  pull_request:
    branches: [main]
    paths:
      - "tokens/**"
      - "figma-tokens.json"
      - "scripts/figma-variables-sync.mjs"
      - "scripts/figma-variables-sync.test.mjs"
      - ".github/workflows/figma-variables-sync.yml"
  workflow_dispatch:

concurrency:
  group: figma-variables-sync-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    name: Sync variables (dry-run report)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests (create-or-update-only invariant)
        run: node --test scripts/figma-variables-sync.test.mjs
      - name: Dry-run diff report (repo -> Figma)
        # Fork PRs can't read FIGMA_ACCESS_TOKEN — skip so this can't hard-fail.
        # The script degrades gracefully (warns, exit 0) on a missing token or
        # a missing Variables scope; it never writes in --dry-run mode.
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: node scripts/figma-variables-sync.mjs --dry-run
