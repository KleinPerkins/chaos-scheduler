name: release

# Build + publish the artifacts for a release that release-please just created.
#
# This is a REUSABLE workflow (`workflow_call`) invoked from release-please.yml.
# It is NOT triggered by GitHub `release`/`push` events, because a Release created
# by the workflow's GITHUB_TOKEN cannot trigger further workflows. `workflow_dispatch`
# is also provided for manual re-runs (e.g. re-attaching assets to an existing tag).
#
# GATING SIGNAL: the per-component release TAG STRINGS (`desktop_tag`, `sdk_tag`,
# `mcp_tag`) are the *only* signal for what to do — a non-empty tag means "act on
# this component". We deliberately do NOT take `type: boolean` inputs derived from
# `<tag> != ''` expressions: GitHub coerces such expression results to the string
# "false" when passed to a `type: boolean` reusable-workflow input, so every job
# silently skipped even though release-please created the tags (the v1.0.1/v1.0.2
# skip; see docs/RELEASING.md → "Release gating"). String inputs propagate across
# `workflow_call` verbatim, so gating each job on `inputs.<component>_tag != ''` is
# coercion-proof.
#
# All build/publish jobs run in the `release` GitHub Environment so signing/publish
# secrets are gated behind required reviewers. See docs/RELEASING.md for the
# secrets checklist.

on:
  workflow_call:
    inputs:
      desktop_tag:
        description: Release tag to build + attach desktop assets to (root component). Empty ⇒ no desktop build.
        type: string
        default: ""
      sdk_tag:
        description: Release tag for the sdk-ts component. Empty ⇒ do not publish the SDK.
        type: string
        default: ""
      mcp_tag:
        description: Release tag for the mcp-server component. Empty ⇒ do not publish the MCP server.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      desktop_tag:
        description: Existing release tag to build + attach desktop assets to (e.g. chaos-scheduler-v1.0.2). Empty ⇒ no desktop build.
        type: string
        default: ""
      sdk_tag:
        description: Release tag for the sdk-ts component to publish (e.g. sdk-ts-v1.0.0). Empty ⇒ do not publish the SDK.
        type: string
        default: ""
      mcp_tag:
        description: Release tag for the mcp-server component to publish (e.g. mcp-server-v1.0.1). Empty ⇒ do not publish the MCP server.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Updater endpoint guard: release-please creates GitHub Releases before any
  # environment-gated signing/build jobs run. If GitHub marks the new, assetless
  # desktop/component release as "Latest" during that approval/build window, the
  # live updater URL (/releases/latest/download/latest.json) 404s until
  # build-macos uploads latest.json and re-pins "Latest" to the new desktop
  # release. This ungated job runs as early as possible for desktop releases and
  # pins "Latest" back to the newest prior root desktop release that already has
  # a latest.json asset. build-macos still performs the final pin after upload.
  # ---------------------------------------------------------------------------
  guard-latest-before-desktop-release:
    name: Guard GitHub "Latest" (pre-desktop build)
    if: ${{ inputs.desktop_tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Re-pin "Latest" to the last asset-bearing desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DESKTOP_TAG: ${{ inputs.desktop_tag }}
        run: node scripts/guard-latest-release.mjs --repo "$REPO" --desktop-tag "$DESKTOP_TAG"

  # ---------------------------------------------------------------------------
  # Release ordering: sdk-ts -> mcp-server -> [consumer install smoke] -> desktop.
  # publish-mcp is a real npm dependent of the sdk (see its own "pin the exact
  # published semver" step), so it must not race publish-sdk. `needs` + a
  # success-or-skipped guard enforces sdk-first without forcing publish-mcp to
  # run when only the SDK released.
  # ---------------------------------------------------------------------------
  publish-sdk:
    name: npm publish @chaos-scheduler/sdk
    if: ${{ inputs.sdk_tag != '' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.sdk_tag }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Build
        working-directory: packages/sdk-ts
        run: |
          npm ci
          npm run build
      - name: Publish (with provenance)
        working-directory: packages/sdk-ts
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # npm: publish the MCP server with provenance.
  # The committed dependency `@chaos-scheduler/sdk: file:../sdk-ts` (a local dev
  # link) is rewritten to the published semver just before publishing so the
  # tarball on npm depends on the real package. The build is done against the
  # local sdk (built here) to avoid any npm-propagation race. Gated on
  # publish-sdk having succeeded or been skipped (sdk-ts -> mcp-server order).
  # ---------------------------------------------------------------------------
  publish-mcp:
    name: npm publish @chaos-scheduler/mcp-server
    if: ${{ !cancelled() && inputs.mcp_tag != '' && (needs.publish-sdk.result == 'success' || needs.publish-sdk.result == 'skipped') }}
    needs: [publish-sdk]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.mcp_tag }}
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Build sdk (local dependency of mcp-server)
        working-directory: packages/sdk-ts
        run: |
          npm ci
          npm run build
      - name: Build mcp-server (against local sdk)
        working-directory: packages/mcp-server
        run: |
          npm ci
          npm run build
      - name: Pin @chaos-scheduler/sdk to the published semver
        run: |
          SDK_VERSION=$(node -p "require('./packages/sdk-ts/package.json').version")
          export SDK_VERSION
          node -e "const fs=require('fs');const p='packages/mcp-server/package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.dependencies['@chaos-scheduler/sdk']='^'+process.env.SDK_VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"
          echo "Rewrote @chaos-scheduler/sdk dependency to ^$SDK_VERSION"
      - name: Publish (with provenance)
        working-directory: packages/mcp-server
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Consumer-install smoke gate: proves the exact pinned mcp-server version is
  # installable by a clean npm consumer and resolves the SDK from the registry
  # (not file:../sdk-ts), *before* the desktop build stamps that version as the
  # one it provisions. Runs whenever a desktop build needs a pin to validate,
  # or whenever mcp-server was freshly published (validate it standalone even
  # on a package-only release with no desktop bump).
  #
  # The target version is read from packages/mcp-server/package.json at the
  # relevant tag — for a desktop-only release (no mcp bump this run) that file
  # still reflects the last-released mcp-server version, since this is a
  # monorepo: whichever version was last actually published is what the
  # desktop build should keep pinning.
  # ---------------------------------------------------------------------------
  mcp-consumer-smoke:
    name: Consumer-install smoke (@chaos-scheduler/mcp-server)
    if: ${{ !cancelled() && (inputs.desktop_tag != '' || inputs.mcp_tag != '') && (needs.publish-mcp.result == 'success' || needs.publish-mcp.result == 'skipped') }}
    needs: [publish-sdk, publish-mcp]
    runs-on: ubuntu-latest
    outputs:
      mcp_version: ${{ steps.resolve.outputs.mcp_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          # Prefer the mcp release tag when one exists this run; otherwise the
          # desktop tag's checkout still has the last-published version in
          # packages/mcp-server/package.json (monorepo, shared history).
          ref: ${{ inputs.mcp_tag != '' && inputs.mcp_tag || inputs.desktop_tag }}
      - name: Resolve target mcp-server version
        id: resolve
        run: |
          MCP_VERSION=$(node -p "require('./packages/mcp-server/package.json').version")
          echo "Target pinned version: $MCP_VERSION"
          echo "mcp_version=$MCP_VERSION" >> "$GITHUB_OUTPUT"
      # Test against the package's documented floor (engines.node >=18), not
      # whatever newer version .nvmrc pins for everyday dev/CI — that's the
      # actual compatibility claim this gate is verifying.
      - uses: actions/setup-node@v6
        with:
          node-version: "18"
      - name: npm-consumer install + CLI smoke
        run: node scripts/smoke-mcp-install.mjs "${{ steps.resolve.outputs.mcp_version }}"

  # ---------------------------------------------------------------------------
  # Desktop app: signed + notarized, hardened-runtime, universal macOS binary.
  # Uploads the .dmg (initial install) + .app.tar.gz + .sig + latest.json
  # (updater) to the GitHub Release created by release-please. Gated on the
  # consumer-install smoke check above, so the desktop build never stamps an
  # mcp-server version it hasn't proven installable.
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS desktop (signed + notarized, universal)
    if: ${{ !cancelled() && inputs.desktop_tag != '' && needs.mcp-consumer-smoke.result == 'success' && needs.guard-latest-before-desktop-release.result == 'success' }}
    needs: [mcp-consumer-smoke, guard-latest-before-desktop-release]
    runs-on: macos-14
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.desktop_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Rust toolchain (from rust-toolchain.toml) + macOS targets
        run: |
          rustup show
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Managed MCP provisioning invariant (docs/RELEASING.md "Managed MCP/SDK
      # coherence"): the desktop build only ever embeds an mcp-server version
      # that mcp-consumer-smoke has already proven installable from npm. This
      # file is compiled into the binary via `include_str!` (src-tauri/src/mcp.rs)
      # — never committed back, just stamped into this ephemeral checkout right
      # before the build that will read it.
      - name: Stamp pinned MCP version into the desktop build
        run: |
          echo "${{ needs.mcp-consumer-smoke.outputs.mcp_version }}" > src-tauri/mcp-pinned-version.txt
          echo "Stamped src-tauri/mcp-pinned-version.txt -> ${{ needs.mcp-consumer-smoke.outputs.mcp_version }}"

      - name: Resolve GitHub Release id for tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id=$(gh release view "${{ inputs.desktop_tag }}" \
            --repo "${{ github.repository }}" \
            --json databaseId --jq '.databaseId')
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

      - name: Build, sign, notarize, and upload artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Apple codesigning + notarization (hardened runtime) ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Tauri updater signing (minisign) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Attach to the Release that release-please already created.
          releaseId: ${{ steps.rel.outputs.release_id }}
          # Universal (aarch64 + x86_64) macOS build.
          args: --target universal-apple-darwin
          # Generate + upload the updater manifest (latest.json). The app-side
          # pubkey/endpoints (GitHub Releases latest/download/latest.json) are set
          # in src-tauri/tauri.conf.json by the desktop worker; the private half
          # (TAURI_SIGNING_PRIVATE_KEY) signs the artifacts here so they verify.
          # NOTE: renamed from `includeUpdaterJson` in tauri-action v1.
          uploadUpdaterJson: true

      # Pin GitHub's "Latest" flag to THIS desktop release, after its assets are
      # uploaded. release-please creates several releases per version (the linked
      # chaos-scheduler-tauri-v*, plus sdk-ts-v* / mcp-server-v*), and GitHub's
      # default make_latest marks the last-created non-prerelease release "Latest".
      # That was landing on chaos-scheduler-tauri-v* (which carries NO assets), so
      # the updater endpoint /releases/latest/download/latest.json 404'd and
      # auto-update broke. The desktop release is the only one holding latest.json,
      # so force it to "Latest" here — after upload, to avoid a transient 404.
      # See docs/RELEASING.md → "Updater publishing" (multi-release 'Latest' pitfall).
      - name: Pin "Latest" to the desktop release (updater endpoint)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ inputs.desktop_tag }}" \
            --repo "${{ github.repository }}" \
            --latest

      # Section 7 release smoke gate: a green build + a green "Latest" re-pin
      # can still leave the live updater endpoint 404ing or stale (GitHub CDN
      # caches the redirect for a few minutes — see docs/RELEASING.md). Prove
      # the actual endpoint, not just the release metadata, serves this exact
      # version with a downloadable + signed artifact before calling the
      # release done.
      - name: Smoke-check the live latest.json updater endpoint
        run: |
          version="${{ inputs.desktop_tag }}"
          version="${version#chaos-scheduler-v}"
          node scripts/smoke-latest-json.mjs "$version"

  # ---------------------------------------------------------------------------
  # Guard against a package-only release (sdk-ts / mcp-server, no desktop bump)
  # stealing GitHub's "Latest" flag. build-macos only re-pins "Latest" when it
  # runs; a release that publishes only npm packages never runs build-macos, so
  # a component release (sdk-ts-v* / mcp-server-v*) can transiently grab
  # "Latest" from the desktop release and 404 the updater endpoint (see
  # docs/RELEASING.md "Residual edge case"). This job automates the previously
  # manual `gh release edit <desktop> --latest` recovery whenever that happens.
  # No-ops (and does not need `release` Environment secrets) when there is
  # nothing to fix.
  # ---------------------------------------------------------------------------
  guard-latest-for-package-only-release:
    name: Guard GitHub "Latest" (package-only release)
    if: ${{ always() && inputs.desktop_tag == '' && (inputs.sdk_tag != '' || inputs.mcp_tag != '') }}
    needs: [publish-sdk, publish-mcp]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Re-pin "Latest" to the most recent asset-bearing desktop release if it drifted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node scripts/guard-latest-release.mjs --repo "$REPO"
