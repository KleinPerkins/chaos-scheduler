name: release-please

# Single source of truth for versioning. On every push to `main`, release-please
# maintains a Release PR that bumps versions + CHANGELOGs from Conventional
# Commits. Merging that PR tags + creates the GitHub Release(s), then this
# workflow calls release.yml (as a reusable workflow) to build/sign/publish.
#
# Gating uses release-please's PATH-prefixed outputs (verified against the
# release-please-action v4 docs):
#   * root component (path ".") emits UN-prefixed outputs: release_created,
#     tag_name, version  (the desktop app: root node + src-tauri rust, linked);
#   * non-root paths are prefixed, e.g. `packages/sdk-ts--release_created`.
# We do NOT gate on `releases_created` (unreliable in v4) or on GitHub
# `release`/`push` events (a GITHUB_TOKEN-created release cannot trigger another
# workflow). Calling release.yml as a reusable workflow keeps it in the same run,
# so the token-trigger limitation does not apply. See docs/RELEASING.md.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Desktop app (root path "." — root node + src-tauri rust are lockstep-linked).
      desktop_release_created: ${{ steps.release.outputs.release_created }}
      desktop_tag_name: ${{ steps.release.outputs.tag_name }}
      desktop_version: ${{ steps.release.outputs.version }}
      # TypeScript SDK (path packages/sdk-ts).
      sdk_release_created: ${{ steps.release.outputs['packages/sdk-ts--release_created'] }}
      sdk_tag_name: ${{ steps.release.outputs['packages/sdk-ts--tag_name'] }}
      sdk_version: ${{ steps.release.outputs['packages/sdk-ts--version'] }}
      # MCP server (path packages/mcp-server).
      mcp_release_created: ${{ steps.release.outputs['packages/mcp-server--release_created'] }}
      mcp_tag_name: ${{ steps.release.outputs['packages/mcp-server--tag_name'] }}
      mcp_version: ${{ steps.release.outputs['packages/mcp-server--version'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build/sign/publish only when at least one component was actually released.
  release:
    needs: release-please
    if: >-
      ${{ needs.release-please.outputs.desktop_release_created == 'true' ||
          needs.release-please.outputs.sdk_release_created == 'true' ||
          needs.release-please.outputs.mcp_release_created == 'true' }}
    permissions:
      contents: write
      id-token: write
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      build_desktop: ${{ needs.release-please.outputs.desktop_release_created == 'true' }}
      desktop_tag: ${{ needs.release-please.outputs.desktop_tag_name }}
      publish_sdk: ${{ needs.release-please.outputs.sdk_release_created == 'true' }}
      sdk_tag: ${{ needs.release-please.outputs.sdk_tag_name }}
      publish_mcp: ${{ needs.release-please.outputs.mcp_release_created == 'true' }}
      mcp_tag: ${{ needs.release-please.outputs.mcp_tag_name }}
