name: App auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Dependabot-authored `pull_request` runs receive only Dependabot-scoped
  # secrets — NOT the Actions secrets — so the `auto-merge` job below cannot mint
  # the AUTOMERGE_APP_* token for them and they would sit blocked. `workflow_run`
  # fires in the BASE-repo context with FULL Actions secrets even for Dependabot,
  # so the `auto-merge-ci` job can approve + arm auto-merge once CI is green.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
permissions:
  contents: read
jobs:
  # PATH 1 — normal (human / non-Dependabot) PRs. Behavior is unchanged: on every
  # PR event, mint the App token, approve, and arm squash auto-merge. Dependabot
  # PRs are excluded here (`github.actor == 'dependabot[bot]'`) because their
  # pull_request run cannot mint the App token — PATH 2 covers them instead. The
  # skip is silent (an unmet `if:` is a skipped, not failed, check).
  auto-merge:
    # The release-please "chore: release main" PR (head branch
    # `release-please--branches--main`) is deliberately EXCLUDED so cutting a
    # release stays a manual human merge — see docs/RELEASING.md. Match by the
    # `release-please--` head-branch prefix so any future target branch is
    # covered too. Every other non-draft, same-repo PR still auto-merges.
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.draft == false &&
      github.repository == 'KleinPerkins/chaos-scheduler' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review --approve "${{ github.event.pull_request.html_url }}" || true
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"

  # PATH 2 — Dependabot PRs. Runs after the "CI" workflow completes on a same-repo
  # `dependabot/*` PR branch. Unlike a Dependabot `pull_request` run, `workflow_run`
  # executes in the base-repo context with FULL Actions secrets, so minting the
  # AUTOMERGE_APP_* token succeeds. Same release-please exclusion holds, so cutting
  # a release stays a manual human merge on this path too.
  auto-merge-ci:
    if: >-
      github.event_name == 'workflow_run' &&
      github.repository == 'KleinPerkins/chaos-scheduler' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/') &&
      !startsWith(github.event.workflow_run.head_branch, 'release-please--')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
      - name: Approve + arm squash auto-merge for the head branch's open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          # workflow_run gives the head branch, not the PR — resolve the open,
          # non-draft PR for it. Skip cleanly if there is none (e.g. already merged).
          number="$(gh pr list --head "$HEAD_BRANCH" --state open \
            --json number,isDraft \
            --jq '.[0] | select(.isDraft == false) | .number')"
          if [ -z "${number:-}" ]; then
            echo "No open, non-draft PR for '$HEAD_BRANCH' — nothing to auto-merge."
            exit 0
          fi
          echo "Approving + arming squash auto-merge for PR #$number ($HEAD_BRANCH)."
          # `|| true` keeps the job idempotent (re-approving / re-arming is a no-op).
          gh pr review --approve "$number" || true
          gh pr merge --auto --squash "$number" || true
