name: App auto-merge
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
permissions:
  contents: read
jobs:
  auto-merge:
    # The release-please "chore: release main" PR (head branch
    # `release-please--branches--main`) is deliberately EXCLUDED so cutting a
    # release stays a manual human merge — see docs/RELEASING.md. Match by the
    # `release-please--` head-branch prefix so any future target branch is
    # covered too. Every other non-draft, same-repo PR still auto-merges.
    if: >-
      github.event.pull_request.draft == false &&
      github.repository == 'KleinPerkins/chaos-scheduler' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !startsWith(github.event.pull_request.head.ref, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.AUTOMERGE_APP_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review --approve "${{ github.event.pull_request.html_url }}" || true
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
