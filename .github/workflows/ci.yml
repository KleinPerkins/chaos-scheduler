name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Build frontend
        run: npm run build
      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
        working-directory: .
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build frontend (tauri embeds ../dist)
        run: |
          npm ci
          npm run build
        working-directory: .
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --verbose
      - name: Build
        run: cargo build --verbose

  packages:
    name: Packages (sdk-ts + mcp-server build/test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      # sdk-ts first: mcp-server consumes it via `file:../sdk-ts` and needs its
      # built dist for typechecking.
      - name: sdk-ts — install, build, test
        working-directory: packages/sdk-ts
        run: |
          npm ci
          npm run build
          npm test
      - name: mcp-server — install, build, test
        working-directory: packages/mcp-server
        run: |
          npm ci
          npm run build
          npm test

  commitlint:
    name: Commitlint (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate PR commit messages
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  # Single required status check for branch protection on `main`.
  # Configure "ci-required" as the sole required check; it fans in from every
  # other job so adding/removing jobs never requires editing branch protection.
  ci-required:
    name: ci-required
    if: always()
    needs: [frontend, rust, packages, commitlint]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
