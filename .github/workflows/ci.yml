name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
      code_connect: ${{ steps.filter.outputs.code_connect }}
      visual: ${{ steps.filter.outputs.visual }}
      a11y: ${{ steps.filter.outputs.a11y }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            e2e:
              - 'e2e/**'
              - 'src/components/**'
              - 'src/test/fixtures/**'
              - 'src/index.css'
              - 'src/playwright-gate.ts'
              - 'playwright.config.ts'
            code_connect:
              - 'src/**/*.figma.tsx'
              - 'src/components/**/*.tsx'
              - 'figma.config.json'
              - 'tsconfig.figma.json'
              - 'scripts/check-code-connect.mjs'
              - 'scripts/check-code-connect.test.mjs'
              - '.github/workflows/ci.yml'
            visual:
              - 'src/**'
              - 'e2e/visual/**'
              - 'playwright.visual.config.ts'
              - '.github/workflows/ci.yml'
            a11y:
              - 'src/**'
              - 'e2e/a11y/**'
              - 'e2e/support/**'
              - 'playwright.a11y.config.ts'
              - '.github/workflows/ci.yml'

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: MCP diff presentation contract
        run: |
          npm run test:mcp-diff-attribute
          npm run check:mcp-diff-attribute
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      - name: Build frontend
        run: npm run build
      - name: Unit tests (vitest)
        run: npm test
      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 1

  e2e:
    name: E2E (Playwright + mockIPC + axe)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Playwright tests
        run: npm run test:e2e
        env:
          CI: true

  rust:
    name: Rust (fmt, clippy, test, build)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
        working-directory: .
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Build frontend (tauri embeds ../dist)
        run: |
          npm ci
          npm run build
        working-directory: .
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --verbose
      - name: Build
        run: cargo build --verbose

  packages:
    name: Packages (sdk-ts + mcp-server build/test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      # sdk-ts first: mcp-server consumes it via `file:../sdk-ts` and needs its
      # built dist for typechecking.
      - name: sdk-ts — install, build, test
        working-directory: packages/sdk-ts
        run: |
          npm ci
          npm run build
          npm test
      - name: mcp-server — install, build, test
        working-directory: packages/mcp-server
        run: |
          npm ci
          npm run build
          npm test

  commitlint:
    name: Commitlint (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate PR commit messages
        run: npx commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  # Design-token parity: tokens/*.json is the source of truth. This job (1)
  # validates the shape of every token source and (2) regenerates the tracked
  # artifacts (src/styles/tokens.css|ts, figma-tokens.json) and fails if they
  # drift from what is committed — so a token change can never merge with stale
  # generated output. It never changes token values or Style Dictionary config.
  tokens:
    name: Design tokens (schema + freshness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Validate token source shape (tokens/*.json)
        run: npm run tokens:validate
      - name: Unit tests (token validator)
        run: npm run test:tokens
      - name: Verify generated tokens are committed-fresh
        run: npm run tokens:check

  # Credential-free Code Connect health check. The repo is the source of truth
  # for its Figma mappings (src/**/*.figma.tsx); the live publish needs a PAT and
  # is deliberately outside ci-required, so this required, credential-free check
  # catches a malformed mapping on the PR that introduces it. It (1) type-checks
  # every mapping against the real component (real props), (2) runs the
  # credential-free `figma connect parse`, and (3) validates each existing
  # mapping resolves to a real source file and renders a real snippet. It does
  # NOT require every component to have a mapping. Runs when a mapping OR a
  # mapped source file changes (see the `code_connect` filter above).
  code-connect:
    name: Code Connect (typecheck + parse + coverage)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code_connect == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Type-check Code Connect mappings (real component props)
        run: npm run figma:typecheck
      - name: Unit tests (Code Connect validator)
        run: npm run test:code-connect
      - name: Parse + validate mappings (credential-free)
        run: npm run code-connect:check

  # Strict accessibility gate across the stable surfaces in BOTH themes, plus a
  # theme-toggle interaction, a reduced-motion assertion, and a self-hosted-Inter
  # font-load assertion (e2e/a11y). Unlike the lenient functional axe checks
  # (critical/serious only), this fails on ANY non-allowlisted violation at any
  # impact — the allowlist holds documented, pre-existing product issues (see
  # e2e/a11y/a11y.spec.ts). Runs when product UI (src/**) or the a11y harness
  # changes. Required (in the ci-required fan-in below).
  a11y:
    name: Accessibility (axe dark+light, motion, fonts)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.a11y == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Strict axe (dark+light) + theme-toggle + reduced-motion + fonts
        run: npm run test:a11y
        env:
          CI: true

  # Deterministic visual-regression check. REQUIRED — a member of the ci-required
  # fan-in below. It is safe to require because it is deterministic and stable
  # (pinned container + workers:1 + maxDiffPixelRatio:0.01 + reduced-motion +
  # animations disabled + frozen clock + fixed mockIPC fixtures) and path-filtered,
  # so a PR that doesn't touch visual paths skips it without blocking. It renders
  # the stable surfaces inside the SAME pinned Playwright container the baselines
  # were generated in (v1.61.1-jammy — keep in lockstep with visual-baselines.yml)
  # and compares against the committed `-linux` screenshots
  # (e2e/visual/__screenshots__/*-linux.png). After an intentional UI change,
  # refresh the baselines via the visual-baselines.yml workflow (a stale baseline
  # now blocks merge). Runs when product UI (src/**) or the harness changes.
  visual:
    name: Visual regression (stable surfaces)
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.visual == 'true'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-jammy
    steps:
      - uses: actions/checkout@v7
      - name: Trust workspace (container runs as root)
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - name: Compare stable surfaces against committed baselines
        run: npm run test:visual
        env:
          CI: true
      - name: Upload visual diff on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff
          path: test-results/**
          retention-days: 7

  # Pre-release guard: the Rust `tauri` crate and the JS `@tauri-apps/*` packages
  # must share a major.minor or `tauri build` aborts in the release job (root
  # cause of the 0.3.0 desktop build failure). Compile-free lockfile check.
  tauri-versions:
    name: Tauri version parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - name: Check Rust crate vs @tauri-apps/* parity
        run: node scripts/check-tauri-versions.mjs

  # Single required status check for branch protection on `main`.
  # Configure "ci-required" as the sole required check; it fans in from every
  # other job so adding/removing jobs never requires editing branch protection.
  # NOTE: the `visual` job is now a REQUIRED member of `needs` below. Like the
  # other path-filtered members (`e2e`/`a11y`/`code-connect`), a PR that doesn't
  # touch visual paths skips it, and a skipped job's result is neither 'failure'
  # nor 'cancelled' — so the fan-in step below stays green and the skip never
  # blocks a merge.
  ci-required:
    name: ci-required
    if: always()
    needs:
      [
        changes,
        frontend,
        e2e,
        rust,
        packages,
        commitlint,
        tauri-versions,
        tokens,
        code-connect,
        a11y,
        visual,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          if ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}; then
            echo "::error::One or more required CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs passed."
