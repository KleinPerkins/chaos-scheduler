version: 2
updates:
  # Frontend / tooling (root package.json).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-dev:
        dependency-type: development
      npm-prod:
        dependency-type: production
    # TS 7's native Go port drops the classic compiler JS API that
    # typescript-eslint needs (peer dep caps at typescript <6.1.0), which
    # crashes ESLint at import time. Lift once typescript-eslint supports TS 7.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Rust backend.
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used by workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
