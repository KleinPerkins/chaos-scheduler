name: Bug report
description: Report a defect in Chaos Scheduler
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill out the sections below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Found in Settings, or `GET /version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: macOS 15.5 (arm64)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (this is automatically formatted as code).
      render: shell
